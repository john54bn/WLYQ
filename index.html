<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>晚霖映秋 · 星尘树洞</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #05070a;
      font-family: 'Times New Roman', '宋体', 'Songti SC', 'KaiTi', serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .constellation-name {
      position: absolute;
      top: 30px;
      left: 30px;
      color: #d9e6f5;
      font-size: 2.2rem;
      letter-spacing: 10px;
      text-shadow: 0 0 20px #6a9ec0, 0 0 40px #2f5575;
      opacity: 0.8;
      font-weight: 300;
      z-index: 10;
      pointer-events: none;
    }
    .action-area {
      position: absolute;
      bottom: 25px;
      right: 25px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }
    .toggle-message-btn {
      background: rgba(15, 30, 50, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(160, 200, 240, 0.3);
      color: #d0e2ff;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.2s;
      font-family: inherit;
      letter-spacing: 2px;
    }
    .toggle-message-btn:hover {
      background: rgba(30, 60, 100, 0.7);
      border-color: #8bb9ff;
      color: white;
      box-shadow: 0 0 20px #3f6a9c;
    }
    .message-panel {
      width: 340px;
      max-height: 500px;
      background: rgba(8, 18, 28, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid #2c4c6e;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      display: none;
      color: #e2ecfe;
      flex-direction: column;
      gap: 15px;
    }
    .message-panel.show {
      display: flex;
    }
    .message-panel input, .message-panel textarea {
      background: rgba(20, 40, 60, 0.6);
      border: 1px solid #2f5470;
      border-radius: 18px;
      padding: 12px 16px;
      color: #f0f6ff;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      resize: vertical;
    }
    .message-panel input::placeholder, .message-panel textarea::placeholder {
      color: #8ba4c2;
    }
    .message-panel button {
      background: #2f5575;
      border: none;
      color: white;
      padding: 12px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .message-panel button:hover {
      background: #3f6a9c;
    }
    .close-btn {
      text-align: right;
      color: #8ba4c2;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .message-card {
      position: absolute;
      background: rgba(5, 15, 28, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(160, 200, 255, 0.25);
      border-radius: 24px;
      padding: 14px 22px;
      color: #eef3fc;
      font-size: 1.2rem;
      line-height: 1.6;
      max-width: 300px;
      box-shadow: 0 10px 30px -5px rgba(0,0,0,0.5), 0 0 0 1px rgba(120,180,240,0.15) inset;
      text-shadow: 0 2px 5px #00000040;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.2s ease;
      border-left: 4px solid #b0d0ff;
    }
    .message-card.visible {
      opacity: 1;
    }
    .refresh-tip {
      position: absolute;
      bottom: 25px;
      left: 25px;
      color: #4f7399;
      font-size: 0.8rem;
      opacity: 0.5;
      z-index: 10;
    }
  </style>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="constellation-name">晚霖映秋</div>
  <div class="refresh-tip">✧ 每句留言都是一颗星 ✧</div>

  <div class="action-area">
    <div id="messagePanel" class="message-panel">
      <div class="close-btn" id="closePanelBtn">✕</div>
      <input type="text" id="nickInput" placeholder="你的名字 (选填)" maxlength="20">
      <textarea id="messageInput" placeholder="说点什么吧... 它会变成星星 ✦" rows="3" maxlength="200"></textarea>
      <button id="submitMessageBtn">✧ 发射到星空 ✧</button>
    </div>
    <button id="toggleMessageBtn" class="toggle-message-btn">✧ 留一句话 ✧</button>
  </div>

  <div id="messageCard" class="message-card"></div>
  <canvas id="starCanvas"></canvas>

  <script>
    (function(){
      "use strict";

      // ⚠️ 你的 Supabase 信息（已经填好了）
      const SUPABASE_URL = 'https://lqgvdehnaocvlbyzonhk.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxZ3ZkZWhuYW9jdmxieXpvbmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjQzOTEsImV4cCI6MjA5MTkwMDM5MX0.dyM7R7pqIal1Y8UFpoKk5TBE0YZQrxYwvXfIgzV5Mx8';
      
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const canvas = document.getElementById('starCanvas');
      const ctx = canvas.getContext('2d');
      const messageCard = document.getElementById('messageCard');
      
      let width, height;
      let stars = [];
      let meteors = [];
      let mouse = { x: -1000, y: -1000 };
      let activeStarIndex = -1;
      let animationFrame = null;
      let timeOffset = 0;
      let commentsData = [];

      async function fetchComments() {
        try {
          const { data, error } = await supabase
            .from('messages')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(100);
          if (error) throw error;
          return data || [];
        } catch (e) {
          console.error('获取留言失败:', e);
          return [];
        }
      }

      async function submitComment(nick, message) {
        if (!nick) nick = '匿名';
        const { error } = await supabase
          .from('messages')
          .insert([{ nick, message }]);
        if (error) {
          alert('留言失败: ' + error.message);
          return false;
        }
        return true;
      }

      function generateStarsFromComments(comments) {
        const newStars = [];
        const count = comments.length;
        if (count === 0) return [];
        for (let i = 0; i < count; i++) {
          const angle = (i * 2.39996) % (Math.PI * 2);
          const radiusFactor = 0.3 + (i * 0.023) % 0.4;
          const centerX = width * (0.5 + Math.cos(angle) * radiusFactor * 0.85);
          const centerY = height * (0.5 + Math.sin(angle) * radiusFactor * 0.75);
          const x = Math.min(width - 50, Math.max(50, centerX + (Math.random() - 0.5) * 100));
          const y = Math.min(height - 80, Math.max(80, centerY + (Math.random() - 0.5) * 80));
          const baseRadius = 1.5 + (comments[i].message.length % 5) * 0.3 + Math.random() * 1.5;
          newStars.push({
            x, y,
            baseRadius: baseRadius,
            commentData: comments[i],
            phase: Math.random() * Math.PI * 2,
            twinkleSpeed: 0.5 + Math.random() * 1.5
          });
        }
        return newStars;
      }

      async function refreshStars() {
        commentsData = await fetchComments();
        if (width && height) {
          stars = generateStarsFromComments(commentsData);
        }
      }

     function draw() {
  if (!width || !height) return;
  ctx.clearRect(0, 0, width, height);
  
  // 深邃夜空背景
  const gradient = ctx.createLinearGradient(0, 0, 0, height);
  gradient.addColorStop(0, '#03060a');
  gradient.addColorStop(0.7, '#0e1a26');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);
  
  // 背景闪烁的暗星
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 200; i++) {
    const sx = (i * 131) % width, sy = (i * 237) % height;
    ctx.globalAlpha = 0.1 + 0.1 * Math.sin(i + timeOffset * 0.01);
    ctx.beginPath();
    ctx.arc(sx, sy, 0.5, 0, 2 * Math.PI);
    ctx.fill();
  }
  ctx.globalAlpha = 1.0;

  // ----- 绘制流星（新增）-----
  // 每帧有一定概率生成新流星（大约每秒2~3颗）
  if (Math.random() < 0.05) {
    meteors.push({
      x: width - 50 + Math.random() * 100,            // 从右侧出现
      y: 20 + Math.random() * (height * 0.3),         // 上半部分
      length: 60 + Math.random() * 80,                // 尾巴长度
      speed: 8 + Math.random() * 12,                  // 移动速度
      opacity: 0.7 + Math.random() * 0.3,
      angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3 // 大致45度向左下
    });
  }

  // 更新并绘制流星
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    // 移动
    m.x -= m.speed * Math.cos(m.angle);
    m.y += m.speed * Math.sin(m.angle);
    m.opacity *= 0.99; // 逐渐淡出
    
    // 超出左边界或太淡就移除
    if (m.x < -100 || m.y > height + 100 || m.opacity < 0.02) {
      meteors.splice(i, 1);
      continue;
    }
    
    // 绘制流星（一条渐隐的线）
    const tailX = m.x + m.length * Math.cos(m.angle);
    const tailY = m.y - m.length * Math.sin(m.angle);
    
    const gradientMeteor = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
    gradientMeteor.addColorStop(0, `rgba(255, 255, 255, ${m.opacity})`);
    gradientMeteor.addColorStop(0.6, `rgba(180, 210, 255, ${m.opacity * 0.5})`);
    gradientMeteor.addColorStop(1, 'transparent');
    
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(tailX, tailY);
    ctx.strokeStyle = gradientMeteor;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.stroke();
    
    // 流星头部亮点
    ctx.beginPath();
    ctx.arc(m.x, m.y, 2.5, 0, 2 * Math.PI);
    ctx.fillStyle = `rgba(255, 255, 255, ${m.opacity})`;
    ctx.shadowColor = '#aac8f0';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  // ----- 流星绘制结束 -----

  // 绘制留言星星（原有逻辑不变）
  stars.forEach((star, index) => {
    const distToMouse = Math.hypot(mouse.x - star.x, mouse.y - star.y);
    const isHovered = (distToMouse < 50);
    const twinkle = Math.sin(timeOffset * 0.02 * star.twinkleSpeed + star.phase) * 0.2 + 0.8;
    let radius = star.baseRadius * (0.8 + 0.3 * twinkle);
    
    if (isHovered) {
      radius = star.baseRadius * 2.2;
      if (activeStarIndex !== index) {
        activeStarIndex = index;
        showMessageCard(star, mouse.x, mouse.y);
      }
    }
    
    const gradientStar = ctx.createRadialGradient(star.x-2, star.y-2, 1, star.x, star.y, radius*3);
    if (isHovered) {
      gradientStar.addColorStop(0, '#f2e09f');
      gradientStar.addColorStop(0.6, '#c5a86a');
      gradientStar.addColorStop(1, 'transparent');
    } else {
      gradientStar.addColorStop(0, '#b8d4f0');
      gradientStar.addColorStop(0.5, '#6a9ec0');
      gradientStar.addColorStop(1, 'transparent');
    }
    
    ctx.globalAlpha = isHovered ? 1 : 0.8;
    ctx.beginPath();
    ctx.arc(star.x, star.y, radius, 0, 2*Math.PI);
    ctx.fillStyle = gradientStar;
    ctx.fill();
    
    if (isHovered || radius > 2.5) {
      ctx.strokeStyle = isHovered ? '#f5e3b3' : '#aac8f0';
      ctx.lineWidth = isHovered ? 1.5 : 0.8;
      ctx.globalAlpha = isHovered ? 0.9 : 0.5;
      ctx.beginPath();
      ctx.moveTo(star.x - radius*2, star.y);
      ctx.lineTo(star.x - radius*0.8, star.y);
      ctx.moveTo(star.x + radius*0.8, star.y);
      ctx.lineTo(star.x + radius*2, star.y);
      ctx.moveTo(star.x, star.y - radius*2);
      ctx.lineTo(star.x, star.y - radius*0.8);
      ctx.moveTo(star.x, star.y + radius*0.8);
      ctx.lineTo(star.x, star.y + radius*2);
      ctx.stroke();
    }
  });
  
  ctx.globalAlpha = 1.0;
  
  if (activeStarIndex !== -1) {
    const star = stars[activeStarIndex];
    if (star && Math.hypot(mouse.x - star.x, mouse.y - star.y) > 60) {
      hideMessageCard();
      activeStarIndex = -1;
    }
  }
  
  timeOffset++;
  animationFrame = requestAnimationFrame(draw);
}

      function showMessageCard(star, mx, my) {
        if (!star || !star.commentData) return;
        const message = star.commentData.message || '......';
        const nick = star.commentData.nick || '匿名';
        messageCard.innerHTML = `“${message}”<br><span style="font-size:0.9rem; opacity:0.7; margin-top:8px; display:block;">—— ${nick}</span>`;
        messageCard.classList.add('visible');
        let left = mx + 20;
        let top = my - 40;
        const cardWidth = messageCard.offsetWidth;
        const cardHeight = messageCard.offsetHeight;
        if (left + cardWidth > width - 20) left = mx - cardWidth - 20;
        if (top + cardHeight > height - 20) top = my - cardHeight - 20;
        if (top < 20) top = 20;
        if (left < 20) left = 20;
        messageCard.style.left = left + 'px';
        messageCard.style.top = top + 'px';
      }

      function hideMessageCard() {
        messageCard.classList.remove('visible');
      }

      function onMouseMove(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        mouse.x = (e.clientX - rect.left) * scaleX;
        mouse.y = (e.clientY - rect.top) * scaleY;
      }

      function onResize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        if (commentsData.length) {
          stars = generateStarsFromComments(commentsData);
        } else {
          stars = generateStarsFromComments([
            { nick: '晚霖', message: '这里还没有留言，留下第一颗星星吧。' }
          ]);
        }
      }

      function initUI() {
        const toggleBtn = document.getElementById('toggleMessageBtn');
        const panel = document.getElementById('messagePanel');
        const closeBtn = document.getElementById('closePanelBtn');
        const submitBtn = document.getElementById('submitMessageBtn');
        const nickInput = document.getElementById('nickInput');
        const messageInput = document.getElementById('messageInput');
        
        toggleBtn.addEventListener('click', () => panel.classList.add('show'));
        closeBtn.addEventListener('click', () => panel.classList.remove('show'));
        canvas.addEventListener('click', () => panel.classList.remove('show'));
        
        submitBtn.addEventListener('click', async () => {
          const nick = nickInput.value.trim();
          const message = messageInput.value.trim();
          if (!message) return alert('请输入留言内容');
          submitBtn.disabled = true;
          submitBtn.textContent = '正在发射...';
          const success = await submitComment(nick, message);
          if (success) {
            nickInput.value = '';
            messageInput.value = '';
            panel.classList.remove('show');
            await refreshStars();
            onResize();
          }
          submitBtn.disabled = false;
          submitBtn.textContent = '✧ 发射到星空 ✧';
        });

        setInterval(() => {
          refreshStars().then(() => onResize());
        }, 30000);
      }

      async function init() {
        initUI();
        await refreshStars();
        window.addEventListener('resize', onResize);
        onResize();
        window.addEventListener('mousemove', onMouseMove);
        animationFrame = requestAnimationFrame(draw);
        canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          if (touch) {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            mouse.y = (touch.clientY - rect.top) * (canvas.height / rect.height);
          }
        }, { passive: false });
        canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          if (touch) {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            mouse.y = (touch.clientY - rect.top) * (canvas.height / rect.height);
          }
        });
      }

      init().catch(console.error);
    })();
  </script>
</body>
</html>
