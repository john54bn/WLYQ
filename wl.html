<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>晚霖映秋 · 个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Times New Roman', '宋体', 'Songti SC', 'KaiTi', serif;
      background: url('image/72822a4b42fec94b4103f35a9f8da692.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      position: relative;
    }

    /* 藕荷色渐变遮罩层，让背景图融合浪漫色调 */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(230, 210, 220, 0.75), rgba(200, 180, 210, 0.65), rgba(245, 225, 235, 0.7));
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    /* 所有内容放在上层 */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ----- 左上角：头像 + 昵称 ----- */
    .profile {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .nickname {
      font-size: 2rem;
      font-weight: 350;
      letter-spacing: 4px;
      color: #4a3a42;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.4);
      background: rgba(255, 245, 250, 0.3);
      padding: 0.3rem 1.5rem;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* ----- 中间区域：专栏（展示图片和文本）----- */
    .featured {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .card {
      background: rgba(255, 245, 250, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 1.8rem 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 15px 30px -8px rgba(80, 40, 60, 0.15);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 35px -6px rgba(100, 50, 70, 0.2);
      background: rgba(255, 250, 252, 0.5);
    }

    .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .card-title {
      font-size: 1.6rem;
      font-weight: 380;
      letter-spacing: 2px;
      color: #3f2e38;
      margin-bottom: 0.5rem;
      border-left: 4px solid #b08a9e;
      padding-left: 1rem;
    }

    .card-text {
      color: #4d3a44;
      line-height: 1.7;
      font-size: 1.05rem;
      opacity: 0.9;
    }

    /* ----- 左下角：联系方式 ----- */
    .footer {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 1.5rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4a3540;
      text-decoration: none;
      font-size: 1.1rem;
      background: rgba(255, 240, 245, 0.4);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: all 0.2s;
    }

    .contact-item:hover {
      background: rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 12px rgba(150, 100, 120, 0.2);
      color: #2b1e24;
    }

    .contact-icon {
      font-size: 1.4rem;
    }

    /* 简单的响应式 */
    @media (max-width: 600px) {
      .container { padding: 1.5rem; }
      .nickname { font-size: 1.6rem; }
      .avatar { width: 55px; height: 55px; }
    }

    /* 返回星空链接 */
    .back-link {
      margin-left: auto;
      color: #5e4452;
      text-decoration: none;
      font-size: 1rem;
      background: rgba(255, 240, 245, 0.4);
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: all 0.2s;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左上角：头像 + 昵称 -->
    <div class="profile">
      <img class="avatar" src="image/abec3600c4fbf7d1e9d587127aa76b90.jpg" alt="头像">
      <div class="nickname">晚霖映秋</div>
    </div>

    <!-- 专栏区域：可以放多个卡片，每个卡片有图片 + 文本 -->
    <div class="featured">
      <!-- 卡片 1 -->
      <div class="card">
        <img class="card-img" src="专栏图1.jpg" alt="专栏图片">
        <div class="card-title">游戏主页</div>
        <div class="card-text">喜欢玩游戏</div>
      </div>
      <!-- 卡片 2 -->
      <div class="card">
        <img class="card-img" src="专栏图2.jpg" alt="专栏图片">
        <div class="card-title">风景主页</div>
        <div class="card-text">偶尔拍几张</div>
      </div>
      <!-- 卡片 3（可选） -->
      <div class="card">
        <img class="card-img" src="专栏图3.jpg" alt="专栏图片">
        <div class="card-title">吐槽主页</div>
        <div class="card-text">bro我真得吐槽你了</div>
      </div>
    </div>

    <!-- 左下角：联系方式 + 返回星空 -->
    <div class="footer">
      <a class="contact-item" href="#" target="_blank">
        <span class="contact-icon">💬</span> 微信：wl24717981
      </a>
      <a class="contact-item" href="mailto:john54@163.com">
        <span class="contact-icon">✉️</span> 邮箱
      </a>
      <a class="contact-item" href="https://github.com/john54bn" target="_blank">
        <span class="contact-icon">🐙</span> GitHub
      </a>
      <!-- 可以继续加其他社交链接 -->
      <a class="back-link" href="index.html">← 返回星空</a>
    </div>
  </div>
</body>
</html>
