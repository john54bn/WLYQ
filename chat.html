<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闲言碎语 · 晚霖映秋</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #f7efe2;
      background-image: radial-gradient(circle at 20% 30%, #f0e0d0 0%, #e8d8c8 100%);
      font-family: 'Georgia', 'KaiTi', '楷体', serif;
      color: #4a3729;
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(255, 250, 240, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 48px 12px 48px 12px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px -10px rgba(80,40,20,0.2);
      border: 1px solid #e0c8b0;
    }
    h1 {
      font-size: 3rem;
      font-weight: normal;
      border-left: 8px solid #b08a7a;
      padding-left: 1.5rem;
      color: #5e3e2e;
      letter-spacing: 6px;
    }
    .sub {
      font-style: italic;
      margin-bottom: 2rem;
      color: #8a6e5e;
    }
    .post {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px dashed #c0a090;
    }
    .post-content {
      font-size: 1.2rem;
      line-height: 1.8;
      text-indent: 2em;
    }
    .post img {
      max-width: 100%;
      margin: 1.2rem 0;
      border-radius: 24px 4px 24px 4px;
      box-shadow: 6px 6px 12px rgba(0,0,0,0.05);
      border: 2px solid #f0e0d0;
    }
    .post-time {
      text-align: right;
      font-size: 0.9rem;
      color: #9a8070;
      margin-top: 0.5rem;
    }
    .admin-panel {
      margin-top: 2rem;
      background: #f0e0d4;
      padding: 1.8rem;
      border-radius: 30px 8px 30px 8px;
      display: none;
    }
    .admin-panel.show { display:block; }
    .admin-panel input, .admin-panel textarea {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid #d0b8a8;
      background: #fffaf4;
      font-family: inherit;
      border-radius: 20px 4px 20px 4px;
    }
    .admin-panel button {
      background: #a08070;
      border: none;
      padding: 0.8rem 2rem;
      color: white;
      border-radius: 30px 8px 30px 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .secret-btn {
      background: none;
      border: 1px dashed #b09888;
      color: #7a6050;
      padding: 0.3rem 1rem;
      margin: 1rem 0;
      cursor: pointer;
    }
    .back-link {
      display: inline-block;
      margin-top: 2rem;
      color: #7a6050;
      text-decoration: none;
      border-bottom: 2px solid #c0a898;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✎ 闲言碎语</h1>
  <div class="sub">· 胡言乱语 ·</div>

  <div id="postsContainer"></div>

  <button class="secret-btn" id="showAdminBtn">🔑 写点东西</button>
  
  <div class="admin-panel" id="adminPanel">
    <h3>📓 新随笔</h3>
    <input type="password" id="passwordInput" placeholder="密码">
    <textarea id="contentInput" rows="4" placeholder="今天想到了什么..."></textarea>
    <!-- 图片上传区域 -->
<input type="file" id="imageUpload" accept="image/*" style="margin-bottom: 1rem;">
<div id="uploadStatus" style="margin-bottom: 0.5rem; color: #888; display: none;">上传中...</div>
<input type="hidden" id="uploadedImageUrl">
    <button id="publishBtn">发布</button>
  </div>

  <a class="back-link" href="wl.html">← 返回小屋</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

const IMGBB_API_KEY = '00ce7fed85f097ac99598a072ac4a46d';  // 👈 改这里

const imageUpload = document.getElementById('imageUpload');
const uploadStatus = document.getElementById('uploadStatus');
const uploadedImageUrl = document.getElementById('uploadedImageUrl');

imageUpload.addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  // 显示上传状态
  uploadStatus.style.display = 'block';
  uploadStatus.textContent = '图片上传中...';

  const formData = new FormData();
  formData.append('image', file);

  try {
    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
      method: 'POST',
      body: formData
    });
    const result = await response.json();
    
    if (result.success) {
      const url = result.data.url;
      uploadedImageUrl.value = url;
      uploadStatus.innerHTML = `✅ 上传成功！<br><img src="${url}" style="max-width:100%; border-radius:8px; margin-top:8px;">`;
    } else {
      throw new Error('上传失败');
    }
  } catch (error) {
    uploadStatus.textContent = '❌ 上传失败，请重试';
    imageUpload.value = '';
    uploadedImageUrl.value = '';
  }
});
   // 发布帖子
publishBtn.addEventListener('click', async function() {
  const password = passwordInput.value.trim();
  const content = contentInput.value.trim();
  const imageUrl = uploadedImageUrl.value;

  if (!content) {
    alert('内容不能为空');
    return;
  }
  if (password !== SECRET) {
    alert('密码错误');
    return;
  }

  const { error } = await supabase
    .from('chat_posts')  // game.html 里改成 'game_posts'
    .insert([{
      content,
      image_url: imageUrl || null,
      secret_key: password
    }]);

  if (error) {
    alert('发布失败：' + error.message);
    return;
  }

  // ✅ 成功提示
  alert('✨ 发布成功！');

  // 清空输入、预览和密码
  contentInput.value = '';
  imageUpload.value = '';
  uploadStatus.style.display = 'none';
  uploadedImageUrl.value = '';
  passwordInput.value = '';
  
  // 关闭面板
  adminPanel.classList.remove('show');
  
  // 刷新列表
  await loadPosts();
});

</script>
</body>
</html>
